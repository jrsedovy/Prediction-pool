<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Pool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #f0ede8;
    --text2: #888;
    --text3: #555;
    --accent: #c8f060;
    --accent-dim: #8aaa30;
    --accent-bg: rgba(200,240,96,0.08);
    --red: #f06060;
    --red-bg: rgba(240,96,96,0.08);
    --amber: #f0b840;
    --amber-bg: rgba(240,184,64,0.08);
    --blue: #60a8f0;
    --blue-bg: rgba(96,168,240,0.08);
    --radius: 10px;
    --radius-sm: 6px;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }

  /* ── Layout ── */
  .page { display: none; }
  .page.active { display: block; }
  .center-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 420px; }
  .panel-wide { max-width: 700px; }
  .app-layout { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* ── Typography ── */
  h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
  h2 { font-size: 1.1rem; font-weight: 500; }
  h3 { font-size: 0.95rem; font-weight: 500; }
  .mono { font-family: var(--mono); }
  .muted { color: var(--text2); }
  .small { font-size: 0.8rem; }
  .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); font-weight: 500; }

  /* ── Logo ── */
  .logo { font-family: var(--mono); font-size: 1.1rem; color: var(--accent); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }

  /* ── Tabs ── */
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; gap: 0; }
  .tab { padding: 10px 18px; font-size: 0.875rem; cursor: pointer; color: var(--text2); background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: var(--sans); transition: color 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

  /* ── Forms ── */
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
  input[type=text], input[type=password], input[type=number], input[type=datetime-local], textarea, select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-family: var(--sans); font-size: 0.9rem; padding: 9px 12px; outline: none; transition: border 0.15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--border2); }
  textarea { resize: vertical; min-height: 72px; }
  select { cursor: pointer; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); font-size: 0.875rem; font-family: var(--sans); font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn-accent { background: var(--accent); color: #0f0f0f; }
  .btn-accent:hover { opacity: 0.9; }
  .btn-ghost { background: none; border: 1px solid var(--border2); color: var(--text); }
  .btn-ghost:hover { background: var(--surface2); }
  .btn-danger { background: none; border: 1px solid var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red-bg); }
  .btn-warn { background: none; border: 1px solid var(--amber); color: var(--amber); }
  .btn-warn:hover { background: var(--amber-bg); }
  .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
  .btn-full { width: 100%; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 12px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .card-title { font-size: 0.975rem; font-weight: 500; line-height: 1.4; flex: 1; }

  /* ── Badges ── */
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 0.7rem; font-family: var(--mono); padding: 3px 8px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
  .badge-open { background: rgba(200,240,96,0.12); color: var(--accent); border: 1px solid rgba(200,240,96,0.2); }
  .badge-locked { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(240,184,64,0.2); }
  .badge-resolved { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .badge-admin { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(96,168,240,0.2); }
  .badge-refund { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(240,184,64,0.2); }

  /* ── Alerts ── */
  .alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 0.85rem; margin: 8px 0; }
  .alert-success { background: rgba(200,240,96,0.08); border: 1px solid rgba(200,240,96,0.2); color: var(--accent); }
  .alert-danger { background: var(--red-bg); border: 1px solid rgba(240,96,96,0.2); color: var(--red); }
  .alert-info { background: var(--blue-bg); border: 1px solid rgba(96,168,240,0.2); color: var(--blue); }
  .alert-warn { background: var(--amber-bg); border: 1px solid rgba(240,184,64,0.2); color: var(--amber); }

  /* ── Pool bar ── */
  .pool-bar-wrap { margin: 10px 0 4px; }
  .pool-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; background: var(--surface2); gap: 2px; }
  .pool-seg { height: 100%; transition: width 0.4s; }
  .pool-bar-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text2); font-family: var(--mono); margin-top: 3px; }

  /* ── Countdown ── */
  .countdown { font-family: var(--mono); font-size: 0.8rem; color: var(--amber); }
  .countdown.urgent { color: var(--red); }

  /* ── Choice display (locked/resolved) ── */
  .choice-block { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; }
  .choice-block.winner { border-color: rgba(200,240,96,0.3); background: rgba(200,240,96,0.05); }
  .choice-block.loser { opacity: 0.5; }
  .choice-block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .choice-block-name { font-weight: 500; font-size: 0.9rem; }
  .choice-block-total { font-family: var(--mono); font-size: 0.8rem; color: var(--text2); }
  .player-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; padding: 3px 0; border-top: 1px solid var(--border); }
  .player-name { color: var(--text2); }
  .player-pcts { font-family: var(--mono); color: var(--text); display: flex; gap: 12px; }
  .player-pct-dim { color: var(--text3); }

  /* ── Choice editor (open) ── */
  .choice-edit-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .choice-edit-label { flex: 1; font-size: 0.9rem; }
  .choice-edit-count { font-size: 0.78rem; color: var(--text3); min-width: 60px; text-align: right; font-family: var(--mono); }
  .choice-edit-input { width: 80px; }
  .choice-edit-row:last-child { border-bottom: none; }

  /* ── Bet summary tag ── */
  .my-bet-tag { font-size: 0.72rem; font-family: var(--mono); color: var(--accent-dim); background: var(--accent-bg); padding: 2px 6px; border-radius: 4px; }

  /* ── Topbar ── */
  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-poolname { font-family: var(--mono); font-size: 0.85rem; color: var(--accent); }
  .topbar-user { font-size: 0.85rem; color: var(--text2); }
  .topbar-tokens { font-family: var(--mono); font-size: 1rem; color: var(--text); }

  /* ── Section titles ── */
  .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); font-weight: 500; margin: 1.5rem 0 0.75rem; }
  .section-label:first-child { margin-top: 0; }

  /* ── Divider ── */
  hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

  /* ── Code / invite ── */
  .invite-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .invite-code { font-family: var(--mono); font-size: 0.85rem; background: var(--surface2); padding: 4px 10px; border-radius: var(--radius-sm); letter-spacing: 0.05em; flex: 1; }
  .invite-link { font-size: 0.75rem; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }

  /* ── Player table ── */
  .player-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .player-item:last-child { border-bottom: none; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 0.75rem; color: var(--accent); flex-shrink: 0; }
  .player-meta { flex: 1; }
  .player-username { font-size: 0.9rem; font-weight: 500; }
  .player-tokens { font-size: 0.78rem; font-family: var(--mono); color: var(--text2); }

  /* ── Audit log ── */
  .audit-row { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
  .audit-row:last-child { border-bottom: none; }
  .audit-time { font-family: var(--mono); color: var(--text3); min-width: 110px; flex-shrink: 0; }
  .audit-msg { color: var(--text2); line-height: 1.5; }
  .audit-msg b { color: var(--text); font-weight: 500; }

  /* ── Resolution report ── */
  .report-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .report-table th { text-align: left; color: var(--text3); font-weight: 500; padding: 4px 8px 4px 0; border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .report-table td { padding: 5px 8px 5px 0; border-bottom: 1px solid var(--border); color: var(--text); }
  .report-table tr:last-child td { border-bottom: none; }
  .pos { color: var(--accent); }
  .neg { color: var(--red); }
  .refund { color: var(--amber); }

  /* ── Misc ── */
  .empty { text-align: center; padding: 3rem 0; color: var(--text3); font-size: 0.875rem; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .flex-center { display: flex; align-items: center; gap: 8px; }
  .mt-sm { margin-top: 8px; }
  .mt { margin-top: 1rem; }
  .resolution-comment { font-size: 0.82rem; color: var(--text2); font-style: italic; border-left: 2px solid var(--border2); padding-left: 10px; margin-top: 8px; }

  /* ── Responsive ── */
  @media (max-width: 500px) {
    .topbar { padding: 0.75rem 1rem; }
    .app-layout { padding: 1rem 0.75rem 4rem; }
    .panel { padding: 1.5rem; }
  }
</style>
</head>
<body>

<!-- ════════════════════════════════════════
     PAGE: Welcome / Auth
════════════════════════════════════════ -->
<div class="page active" id="page-welcome">
  <div class="center-wrap">
    <div class="panel">
      <div class="logo"><div class="logo-dot"></div>prediction pool</div>

      <!-- Auth tabs -->
      <div id="auth-tabs" class="tabs">
        <button class="tab active" onclick="showAuthTab('login')">Sign in</button>
        <button class="tab" onclick="showAuthTab('register')">Join pool</button>
        <button class="tab" onclick="showAuthTab('create')">New pool</button>
      </div>

      <!-- Login -->
      <div id="authtab-login">
        <div class="field"><label>Username</label><input id="li-user" type="text" placeholder="your username" autocomplete="username"/></div>
        <div class="field"><label>Password</label><input id="li-pass" type="password" placeholder="password" autocomplete="current-password"/></div>
        <button class="btn btn-accent btn-full" onclick="doLogin()">Sign in</button>
        <div id="li-err"></div>
      </div>

      <!-- Register -->
      <div id="authtab-register" style="display:none">
        <div id="invite-alert" style="display:none" class="alert alert-info mb">Invite code pre-filled from your link.</div>
        <div class="field"><label>Invite code</label><input id="reg-code" type="text" placeholder="e.g. ABC123" autocomplete="off"/></div>
        <div class="field"><label>Username</label><input id="reg-user" type="text" placeholder="choose a username" autocomplete="username"/></div>
        <div class="field"><label>Password</label><input id="reg-pass" type="password" placeholder="choose a password" autocomplete="new-password"/></div>
        <button class="btn btn-accent btn-full" onclick="doRegister()">Create account</button>
        <div id="reg-err"></div>
      </div>

      <!-- Create pool -->
      <div id="authtab-create" style="display:none">
        <p class="muted small" style="margin-bottom:1rem">You'll be the founding admin. Others join via invite codes you generate.</p>
        <div class="field"><label>Pool name</label><input id="cp-name" type="text" placeholder="e.g. Office Picks 2026"/></div>
        <div class="field"><label>Your username</label><input id="cp-user" type="text" placeholder="admin username" autocomplete="username"/></div>
        <div class="field"><label>Password</label><input id="cp-pass" type="password" placeholder="password" autocomplete="new-password"/></div>
        <button class="btn btn-accent btn-full" onclick="doCreatePool()">Create pool</button>
        <div id="cp-err"></div>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     PAGE: Main App
════════════════════════════════════════ -->
<div class="page" id="page-app">

  <div class="topbar">
    <div class="topbar-left">
      <div class="logo" style="margin:0"><div class="logo-dot"></div><span class="topbar-poolname" id="topbar-poolname">pool</span></div>
      <div class="flex-center">
        <span class="topbar-user" id="topbar-user"></span>
        <span id="topbar-admin-badge" class="badge badge-admin" style="display:none">admin</span>
      </div>
    </div>
    <div class="flex-center">
      <span class="label">tokens</span>
      <span class="topbar-tokens" id="topbar-tokens">100.00</span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">sign out</button>
    </div>
  </div>

  <div class="app-layout">
    <div class="tabs" id="main-tabs">
      <button class="tab active" onclick="switchTab('questions')">Questions</button>
      <button class="tab" onclick="switchTab('mybets')">My bets</button>
      <button class="tab" id="tab-btn-admin" style="display:none" onclick="switchTab('admin')">Admin</button>
    </div>

    <div id="tab-questions"></div>
    <div id="tab-mybets" style="display:none"></div>
    <div id="tab-admin" style="display:none"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// STORAGE — simple localStorage wrapper
// All data lives under predictpool:* keys
// ═══════════════════════════════════════════════════
const KEYS = {
  meta:      'predictpool:meta',
  users:     'predictpool:users',
  questions: 'predictpool:questions',
  bets:      'predictpool:bets',
  invites:   'predictpool:invites',
  audit:     'predictpool:audit',
  reports:   'predictpool:reports',
  session:   'predictpool:session',
};

function lsGet(k)      { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch(e){return null;} }
function lsSet(k,v)    { localStorage.setItem(k, JSON.stringify(v)); }

const loadMeta      = () => lsGet(KEYS.meta)      || null;
const loadUsers     = () => lsGet(KEYS.users)     || {};
const loadQuestions = () => lsGet(KEYS.questions) || [];
const loadBets      = () => lsGet(KEYS.bets)      || {};
const loadInvites   = () => lsGet(KEYS.invites)   || [];
const loadAudit     = () => lsGet(KEYS.audit)     || [];
const loadReports   = () => lsGet(KEYS.reports)   || [];
const loadSession   = () => lsGet(KEYS.session)   || null;

const saveMeta      = v => lsSet(KEYS.meta, v);
const saveUsers     = v => lsSet(KEYS.users, v);
const saveQuestions = v => lsSet(KEYS.questions, v);
const saveBets      = v => lsSet(KEYS.bets, v);
const saveInvites   = v => lsSet(KEYS.invites, v);
const saveAudit     = v => lsSet(KEYS.audit, v);
const saveReports   = v => lsSet(KEYS.reports, v);
const saveSession   = v => lsSet(KEYS.session, v);

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function uid()   { return Math.random().toString(36).slice(2, 9); }
function ts()    { return Date.now(); }
function fmtTs(t){ const d=new Date(t); return d.toLocaleDateString()+' '+d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
function fmtNum(n){ return (Math.round(n*100)/100).toFixed(2); }
function initials(name){ return name.slice(0,2).toUpperCase(); }

function hashPass(p) {
  let h = 5381;
  for (let i = 0; i < p.length; i++) h = ((h << 5) + h) ^ p.charCodeAt(i);
  return (h >>> 0).toString(36);
}

function poolStats(qb, choices) {
  const totals = {};
  let grand = 0;
  choices.forEach(c => {
    totals[c] = Object.values(qb[c] || {}).reduce((a,b) => a+b, 0);
    grand += totals[c];
  });
  return { totals, grand };
}

function addAudit(type, payload, adminId) {
  const log = loadAudit();
  const users = loadUsers();
  log.push({ id: uid(), timestamp: ts(), adminId, adminName: users[adminId]?.username || adminId, type, payload });
  saveAudit(log);
}

// ═══════════════════════════════════════════════════
// SESSION STATE
// ═══════════════════════════════════════════════════
let S = { userId: null, username: null, isAdmin: false, poolName: '' };

// ═══════════════════════════════════════════════════
// PAGE ROUTING
// ═══════════════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showAuthTab(t) {
  document.querySelectorAll('#auth-tabs .tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('#auth-tabs .tab').forEach((el,i) => {
    if(['login','register','create'][i]===t) el.classList.add('active');
  });
  ['login','register','create'].forEach(name => {
    document.getElementById('authtab-'+name).style.display = name===t?'':'none';
  });
}

// ═══════════════════════════════════════════════════
// INVITE LINK — detect #invite=CODE in URL on load
// ═══════════════════════════════════════════════════
function checkInviteHash() {
  const hash = window.location.hash;
  const match = hash.match(/[#&]invite=([A-Z0-9]+)/i);
  if (match) {
    const code = match[1].toUpperCase();
    showAuthTab('register');
    const inp = document.getElementById('reg-code');
    if (inp) { inp.value = code; }
    const alert = document.getElementById('invite-alert');
    if (alert) alert.style.display = '';
    // clean the hash without reloading
    history.replaceState(null, '', window.location.pathname);
  }
}

// ═══════════════════════════════════════════════════
// AUTH ACTIONS
// ═══════════════════════════════════════════════════
function doCreatePool() {
  const name = val('cp-name'), user = val('cp-user').trim().toLowerCase(), pass = val('cp-pass');
  if (!name || !user || !pass) { showErr('cp-err', 'Please fill all fields.'); return; }
  if (loadMeta()) { showErr('cp-err', 'A pool already exists on this device.'); return; }
  const newId = uid();
  saveMeta({ id: uid(), name, createdAt: ts() });
  const users = {};
  users[newId] = { username: user, passHash: hashPass(pass), isAdmin: true, tokens: 100, createdAt: ts() };
  saveUsers(users);
  saveQuestions([]); saveBets({}); saveInvites([]); saveAudit([]); saveReports([]);
  addAudit('pool_created', { name }, newId);
  S = { userId: newId, username: user, isAdmin: true, poolName: name };
  saveSession({ userId: newId });
  enterApp();
}

function doRegister() {
  const code = val('reg-code').trim().toUpperCase();
  const user = val('reg-user').trim().toLowerCase();
  const pass = val('reg-pass');
  if (!code || !user || !pass) { showErr('reg-err', 'Please fill all fields.'); return; }
  const meta = loadMeta();
  if (!meta) { showErr('reg-err', 'No pool found. Ask your admin for the right link.'); return; }
  const invites = loadInvites();
  const inv = invites.find(i => i.code === code && !i.used);
  if (!inv) { showErr('reg-err', 'That invite code is invalid or already used.'); return; }
  const users = loadUsers();
  if (Object.values(users).find(u => u.username === user)) { showErr('reg-err', 'That username is taken.'); return; }
  if (user.length < 2) { showErr('reg-err', 'Username must be at least 2 characters.'); return; }
  inv.used = true; inv.usedBy = user; inv.usedAt = ts();
  saveInvites(invites);
  const newId = uid();
  users[newId] = { username: user, passHash: hashPass(pass), isAdmin: false, tokens: 100, createdAt: ts() };
  saveUsers(users);
  addAudit('user_joined', { username: user }, newId);
  S = { userId: newId, username: user, isAdmin: false, poolName: meta.name };
  saveSession({ userId: newId });
  enterApp();
}

function doLogin() {
  const user = val('li-user').trim().toLowerCase(), pass = val('li-pass');
  if (!user || !pass) { showErr('li-err', 'Please fill all fields.'); return; }
  const meta = loadMeta();
  if (!meta) { showErr('li-err', 'No pool found on this device.'); return; }
  const users = loadUsers();
  const found = Object.entries(users).find(([, u]) => u.username === user && u.passHash === hashPass(pass));
  if (!found) { showErr('li-err', 'Incorrect username or password.'); return; }
  const [fid, fu] = found;
  S = { userId: fid, username: fu.username, isAdmin: fu.isAdmin, poolName: meta.name };
  saveSession({ userId: fid });
  enterApp();
}

function doLogout() {
  saveSession(null);
  S = { userId: null, username: null, isAdmin: false, poolName: '' };
  showPage('page-welcome');
  showAuthTab('login');
}

let currentTab = 'questions';
function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('#main-tabs .tab').forEach(el => el.classList.remove('active'));
  const map = { questions: 0, mybets: 1, admin: 2 };

// ═══════════════════════════════════════════════════
// COUNTDOWN TIMER TICK
// Runs every second, updates all countdown displays
// and auto-locks questions whose deadline has passed
// ═══════════════════════════════════════════════════
function startCountdownTick() {
  setInterval(async () => {
    const qs = loadQuestions();
    let changed = false;
    qs.forEach(q => {
      if (!q.resolved && !q.locked && q.lockDeadline && Date.now() >= q.lockDeadline) {
        q.locked = true;
        q.lockedAt = Date.now();
        q.autoLocked = true;
        changed = true;
        addAudit('bets_locked', { question: q.text, auto: true }, S.userId);
      }
    });
    if (changed) {
      saveQuestions(qs);
      if (currentTab === 'questions') renderQuestions();
      if (currentTab === 'admin')     renderAdmin();
    }
    // update countdown displays without full re-render
    document.querySelectorAll('[data-countdown]').forEach(el => {
      const deadline = parseInt(el.dataset.countdown);
      el.textContent = formatCountdown(deadline);
      el.className = 'countdown' + (deadline - Date.now() < 60000 ? ' urgent' : '');
    });
  }, 1000);
}

function formatCountdown(deadline) {
  const diff = deadline - Date.now();
  if (diff <= 0) return 'locked';
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

// QUESTIONS TAB
// ═══════════════════════════════════════════════════
function renderQuestions() {
  const el = document.getElementById('tab-questions');
  const qs = loadQuestions(), bets = loadBets();
  if (!qs.length) {
    el.innerHTML = `<div class="empty">${S.isAdmin ? 'Post the first question in the Admin tab.' : 'No questions yet — check back soon.'}</div>`;
    return;
  }
  const open     = qs.filter(q => !q.resolved && !q.locked);
  const locked   = qs.filter(q => !q.resolved && q.locked);
  const resolved = qs.filter(q => q.resolved);
  let html = '';
  if (open.length)     { html += `<div class="section-label">Open — bets can be adjusted</div>`; open.forEach(q => { html += buildQCard(q, bets); }); }
  if (locked.length)   { html += `<div class="section-label">Locked — awaiting resolution</div>`; locked.forEach(q => { html += buildQCard(q, bets); }); }
  if (resolved.length) { html += `<div class="section-label">Resolved</div>`; resolved.forEach(q => { html += buildQCard(q, bets); }); }
  el.innerHTML = html;
}

const SEG_COLORS = ['#c8f060','#60a8f0','#f0b840','#f060a8','#60f0d8','#f07860'];

function buildQCard(q, bets) {
  const qb = bets[q.id] || {};
  const { totals, grand } = poolStats(qb, q.choices);
  const myBets = {};
  q.choices.forEach(c => { if ((qb[c] || {})[S.userId]) myBets[c] = (qb[c] || {})[S.userId]; });
  const betterCount = {};
  let totalBetters = 0;
  q.choices.forEach(c => { betterCount[c] = Object.keys(qb[c] || {}).length; totalBetters += betterCount[c]; });
  const users = loadUsers();

  const statusBadge = q.resolved ? 'badge-resolved' : q.locked ? 'badge-locked' : 'badge-open';
  const statusText  = q.resolved ? 'resolved' : q.locked ? 'locked' : 'open';

  let html = `<div class="card"><div class="card-header">
    <span class="card-title">${escHtml(q.text)}</span>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <span class="badge ${statusBadge}">${statusText}</span>
      ${q.lockDeadline && !q.locked && !q.resolved ? `<span class="countdown" data-countdown="${q.lockDeadline}">${formatCountdown(q.lockDeadline)}</span>` : ''}
    </div>
  </div>`;

  if (q.resolved) {
    // Full reveal — show per-side breakdown
    html += renderLockedView(q, qb, totals, grand, users, true);
    // Win/loss message for current user
    if (myBets[q.winner]) {
      const wt = totals[q.winner], lt = grand - wt;
      const earn = wt > 0 ? lt * (myBets[q.winner] / wt) : 0;
      html += `<div class="alert alert-success mt-sm">You won <b>+${fmtNum(earn)}</b> tokens on "${escHtml(q.winner)}"</div>`;
    } else if (Object.keys(myBets).length) {
      html += `<div class="alert alert-danger mt-sm">You lost — winner was "${escHtml(q.winner)}"</div>`;
    } else if (q.refunded) {
      html += `<div class="alert alert-warn mt-sm">This question was refunded — bets returned.</div>`;
    }
    if (q.resolutionComment) {
      html += `<div class="resolution-comment">"${escHtml(q.resolutionComment)}"</div>`;
    }
  } else if (q.locked) {
    // Locked — full allocation visible, no editing
    html += renderLockedView(q, qb, totals, grand, users, false);
  } else {
    // Open — show bet editor
    html += `<div style="font-size:0.8rem;color:var(--text3);margin-bottom:10px;font-family:var(--mono)">${totalBetters} player${totalBetters!==1?'s':''} betting</div>`;
    q.choices.forEach((c, i) => {
      const myAmt = myBets[c] || 0;
      const safe = c.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html += `<div class="choice-edit-row">
        <span class="choice-edit-label">${escHtml(c)}</span>
        ${myAmt > 0 ? `<span class="my-bet-tag">${fmtNum(myAmt)}t</span>` : ''}
        <span class="choice-edit-count">${betterCount[c]} player${betterCount[c]!==1?'s':''}</span>
        ${!S.isAdmin ? `
          <input type="number" min="0" step="0.01" value="${fmtNum(myAmt)}" id="ba-${q.id}-${i}" class="choice-edit-input" />
          <button class="btn btn-ghost btn-sm" onclick="setBet('${q.id}','${safe}',${i})">Set</button>
        ` : ''}
      </div>`;
    });
    if (!S.isAdmin) {
      html += `<div class="small muted mt-sm">Set to 0 to remove a bet. Min non-zero bet: 0.01.</div>`;
    }
  }

  html += `</div>`;
  return html;
}

function renderLockedView(q, qb, totals, grand, users, isResolved) {
  let html = '';
  // Pool bar
  if (grand > 0) {
    html += `<div class="pool-bar-wrap"><div class="pool-bar">`;
    q.choices.forEach((c, i) => {
      const pct = grand > 0 ? (totals[c] / grand * 100) : 0;
      html += `<div class="pool-seg" style="width:${pct.toFixed(1)}%;background:${SEG_COLORS[i % SEG_COLORS.length]}"></div>`;
    });
    html += `</div><div class="pool-bar-labels"><span>Total pool: ${fmtNum(grand)} tokens</span></div></div>`;
  }
  // Per-choice blocks
  q.choices.forEach((c, i) => {
    const betters = Object.entries(qb[c] || {});
    const sideTotal = totals[c];
    const sideColor = SEG_COLORS[i % SEG_COLORS.length];
    let cls = 'choice-block';
    if (isResolved) cls += c === q.winner ? ' winner' : ' loser';
    html += `<div class="${cls}">
      <div class="choice-block-header">
        <span class="choice-block-name" style="color:${isResolved&&c===q.winner?'var(--accent)':'var(--text)'}">${escHtml(c)}${isResolved&&c===q.winner?' ✓':''}</span>
        <span class="choice-block-total" style="color:${sideColor}">${fmtNum(sideTotal)}t &nbsp;·&nbsp; ${grand>0?(sideTotal/grand*100).toFixed(1):0}% of pool</span>
      </div>`;
    if (betters.length) {
      betters.forEach(([uid2, amt]) => {
        const uname = users[uid2]?.username || uid2;
        const pctPool = grand > 0 ? (amt / grand * 100).toFixed(1) : 0;
        const pctSide = sideTotal > 0 ? (amt / sideTotal * 100).toFixed(1) : 0;
        html += `<div class="player-row">
          <span class="player-name">${escHtml(uname)}</span>
          <div class="player-pcts">
            <span>${fmtNum(amt)}t</span>
            <span>${pctSide}% <span class="player-pct-dim">of side</span></span>
            <span class="player-pct-dim">${pctPool}% of pool</span>
          </div>
        </div>`;
      });
    } else {
      html += `<div class="small muted" style="padding-top:6px">No bets on this choice.</div>`;
    }
    html += `</div>`;
  });
  return html;
}

// ═══════════════════════════════════════════════════
// BET SETTING
// ═══════════════════════════════════════════════════
function setBet(qId, choice, idx) {
  const newAmt = parseFloat(document.getElementById(`ba-${qId}-${idx}`)?.value || 0);
  if (isNaN(newAmt) || newAmt < 0) { alert('Enter a valid amount (0 to remove).'); return; }
  if (newAmt > 0 && newAmt < 0.01) { alert('Minimum bet is 0.01 tokens.'); return; }

  const users = loadUsers(), bets = loadBets(), qs = loadQuestions();
  const q = qs.find(x => x.id === qId);
  if (!q || q.resolved || q.locked) return;
  const me = users[S.userId];
  if (!bets[qId]) bets[qId] = {};
  q.choices.forEach(c => { if (!bets[qId][c]) bets[qId][c] = {}; });

  const oldAmt = (bets[qId][choice] || {})[S.userId] || 0;
  const diff = newAmt - oldAmt;
  if (diff > me.tokens + 0.001) { alert(`Not enough tokens. You have ${fmtNum(me.tokens)} available.`); return; }

  if (newAmt === 0) delete bets[qId][choice][S.userId];
  else bets[qId][choice][S.userId] = Math.round(newAmt * 100) / 100;

  me.tokens = Math.round((me.tokens - diff) * 100) / 100;
  saveUsers(users); saveBets(bets);
  refreshTokenDisplay(); renderQuestions();
}

// ═══════════════════════════════════════════════════
// MY BETS TAB
// ═══════════════════════════════════════════════════
function renderMyBets() {
  const el = document.getElementById('tab-mybets');
  const qs = loadQuestions(), bets = loadBets(), users = loadUsers();
  const me = users[S.userId];
  let rows = [];
  qs.forEach(q => {
    const qb = bets[q.id] || {};
    q.choices.forEach(c => {
      const amt = (qb[c] || {})[S.userId];
      if (!amt) return;
      let result = null;
      if (q.resolved) {
        const { totals, grand } = poolStats(qb, q.choices);
        if (q.refunded) result = { refund: true, amt };
        else if (c === q.winner) { const wt = totals[q.winner], lt = grand - wt; result = { win: true, earn: wt > 0 ? lt*(amt/wt) : 0 }; }
        else result = { win: false };
      }
      rows.push({ q, choice: c, amt, result });
    });
  });

  let html = `<div style="display:flex;gap:10px;margin-bottom:1.5rem">
    <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem">
      <div class="label">tokens</div><div style="font-size:1.5rem;font-family:var(--mono);margin-top:4px">${fmtNum(me.tokens)}</div>
    </div>
    <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem">
      <div class="label">active bets</div><div style="font-size:1.5rem;font-family:var(--mono);margin-top:4px">${rows.filter(r=>!r.q.resolved).length}</div>
    </div>
  </div>`;

  if (!rows.length) { html += `<div class="empty">No bets placed yet.</div>`; el.innerHTML = html; return; }

  const open = rows.filter(r => !r.q.locked && !r.q.resolved);
  const locked = rows.filter(r => r.q.locked && !r.q.resolved);
  const resolved = rows.filter(r => r.q.resolved);

  const betCard = (r) => {
    const statusColor = r.q.resolved ? 'var(--text3)' : r.q.locked ? 'var(--amber)' : 'var(--accent)';
    const statusText  = r.q.resolved ? 'resolved' : r.q.locked ? 'locked' : 'open';
    let res = '';
    if (r.result) {
      if (r.result.refund) res = `<div class="alert alert-warn mt-sm">Refunded — ${fmtNum(r.result.amt)} tokens returned</div>`;
      else if (r.result.win) res = `<div class="alert alert-success mt-sm">Won +${fmtNum(r.result.earn)} tokens</div>`;
      else res = `<div class="alert alert-danger mt-sm">Lost — winner was "${escHtml(r.q.winner)}"</div>`;
    }
    return `<div class="card">
      <div class="flex-between" style="margin-bottom:6px">
        <span style="font-size:0.9rem;font-weight:500">${escHtml(r.q.text)}</span>
        <span class="small mono" style="color:${statusColor}">${statusText}</span>
      </div>
      <div class="small muted">Bet <b style="color:var(--text);font-family:var(--mono)">${fmtNum(r.amt)}t</b> on <b style="color:var(--text)">${escHtml(r.choice)}</b>${r.q.lockDeadline&&!r.q.locked?` · <span class="countdown" data-countdown="${r.q.lockDeadline}">${formatCountdown(r.q.lockDeadline)}</span>`:''}</div>
      ${res}
    </div>`;
  };

  if (open.length)     { html += `<div class="section-label">Editable</div>`; open.forEach(r => html += betCard(r)); }
  if (locked.length)   { html += `<div class="section-label">Locked</div>`; locked.forEach(r => html += betCard(r)); }
  if (resolved.length) { html += `<div class="section-label">Resolved</div>`; resolved.forEach(r => html += betCard(r)); }
  el.innerHTML = html;
}

    reports.slice().reverse().forEach(rep => {
      html += `<div class="card">
        <div class="flex-between" style="margin-bottom:6px">
          <span style="font-weight:500">${escHtml(rep.question)}</span>
          <span class="badge ${rep.refunded?'badge-refund':'badge-resolved'}">${rep.refunded?'refunded':'resolved: '+escHtml(rep.winner||'')}</span>
        </div>
        <div class="small muted" style="margin-bottom:10px">${fmtTs(rep.timestamp)} · Pool: ${fmtNum(rep.totalPool)}t${rep.comment?` · "${escHtml(rep.comment)}"`:''}</div>
        <table class="report-table"><thead><tr><th>Player</th><th>Choice</th><th>Bet</th><th>Result</th></tr></thead><tbody>`;
      rep.rows.forEach(r => {
        const cls = r.delta > 0 ? 'pos' : r.delta === 0 ? 'refund' : 'neg';
        const sign = r.delta > 0 ? '+' : '';
        html += `<tr><td>${escHtml(r.username)}</td><td>${escHtml(r.choice)}</td><td class="mono">${fmtNum(r.bet)}t</td><td class="mono ${cls}">${sign}${fmtNum(r.delta)}t</td></tr>`;
      });
      html += `</tbody></table></div>`;
    });
  }

  // ── Audit log ──
  html += `<div class="section-label">Audit log</div><div class="card">`;
  if (!audit.length) {
    html += `<div class="small muted">No events yet.</div>`;
  } else {
    const auditMessages = {
      pool_created:   p => `Pool <b>${escHtml(p.name)}</b> created`,
      user_joined:    p => `<b>${escHtml(p.username)}</b> joined the pool`,
      question_posted:p => `Question posted: "<b>${escHtml(p.question)}</b>"`,
      bets_locked:    p => `Bets locked on "<b>${escHtml(p.question)}</b>"${p.auto?' (auto)':''}`,
      question_resolved:p=>`"<b>${escHtml(p.question)}</b>" resolved as <b>${escHtml(p.winner)}</b>${p.comment?` — "${escHtml(p.comment)}"`: ''}`,
      question_refunded:p=>`"<b>${escHtml(p.question)}</b>" refunded — ${fmtNum(p.totalRefunded)}t returned`,
      admin_changed:  p => `<b>${escHtml(p.target)}</b> ${p.granted?'granted':'removed'} admin`,
      invite_generated:p=>`Invite code <b>${p.code}</b> generated`,
      invite_revoked: p => `Invite code <b>${p.code}</b> revoked`,
      pool_reset:     p => `Pool reset — all players set to <b>${p.tokens}t</b>`,
    };
    audit.slice().reverse().slice(0,50).forEach(ev => {
      const msgFn = auditMessages[ev.type];
      const msg = msgFn ? msgFn(ev.payload) : ev.type;
      html += `<div class="audit-row">
        <span class="audit-time">${fmtTs(ev.timestamp)}</span>
        <span class="audit-msg">${msg} <span style="color:var(--text3)">by ${escHtml(ev.adminName||ev.adminId)}</span></span>
      </div>`;
    });
  }
  html += `</div>`;
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════
// ADMIN ACTIONS
// ═══════════════════════════════════════════════════
function adminCreateQ() {
  const text    = val('nq-text').trim();
  const raw     = val('nq-choices');
  const dlRaw   = val('nq-deadline');
  const choices = raw.split(',').map(s => s.trim()).filter(Boolean);
  if (!text)              { showErr('nq-err', 'Enter a question.'); return; }
  if (choices.length < 2) { showErr('nq-err', 'Enter at least 2 comma-separated choices.'); return; }
  const lockDeadline = dlRaw ? new Date(dlRaw).getTime() : null;
  if (lockDeadline && lockDeadline <= Date.now()) { showErr('nq-err', 'Deadline must be in the future.'); return; }

  const qs = loadQuestions(), bts = loadBets();
  const qid = 'q' + uid();
  qs.push({ id: qid, text, choices, locked: false, lockedAt: null, lockDeadline, resolved: false, winner: null, refunded: false, resolutionComment: null, createdAt: ts() });
  bts[qid] = {};
  choices.forEach(c => { bts[qid][c] = {}; });
  saveQuestions(qs); saveBets(bts);
  addAudit('question_posted', { question: text }, S.userId);
  document.getElementById('nq-text').value = '';
  document.getElementById('nq-choices').value = '';
  document.getElementById('nq-deadline').value = '';
  showErr('nq-err', 'Question posted!', 'success');
  renderAdmin();
  if (currentTab === 'questions') renderQuestions();
}

function adminLock(qId) {
  const qs = loadQuestions();
  const q = qs.find(x => x.id === qId);
  if (!q) return;
  q.locked = true; q.lockedAt = ts();
  saveQuestions(qs);
  addAudit('bets_locked', { question: q.text, auto: false }, S.userId);
  renderAdmin();
  if (currentTab === 'questions') renderQuestions();
}

function adminResolve(qId, winner) {
  const qs = loadQuestions(), bts = loadBets(), users = loadUsers();
  const q = qs.find(x => x.id === qId);
  if (!q || q.resolved) return;
  const comment = (document.getElementById('rc-' + qId)?.value || '').trim();
  const qb = bts[qId] || {};
  const { totals, grand } = poolStats(qb, q.choices);
  const wt = totals[winner], lt = grand - wt;

  q.resolved = true; q.winner = winner; q.resolutionComment = comment || null;
  const reportRows = [];

  if (lt === 0 || wt === 0) {
    // Refund all — no opposing pool
    q.refunded = true; q.winner = null;
    q.choices.forEach(c => {
      Object.entries(qb[c] || {}).forEach(([uid2, amt]) => {
        if (users[uid2]) users[uid2].tokens = Math.round((users[uid2].tokens + amt) * 100) / 100;
        reportRows.push({ username: users[uid2]?.username || uid2, choice: c, bet: amt, delta: 0 });
      });
    });
    addAudit('question_refunded', { question: q.text, totalRefunded: grand }, S.userId);
  } else {
    // Normal resolution
    Object.entries(qb[winner] || {}).forEach(([uid2, amt]) => {
      const earn = wt > 0 ? lt * (amt / wt) : 0;
      if (users[uid2]) users[uid2].tokens = Math.round((users[uid2].tokens + amt + earn) * 100) / 100;
      reportRows.push({ username: users[uid2]?.username || uid2, choice: winner, bet: amt, delta: Math.round(earn * 100) / 100 });
    });
    q.choices.forEach(c => {
      if (c !== winner) {
        Object.entries(qb[c] || {}).forEach(([uid2, amt]) => {
          reportRows.push({ username: users[uid2]?.username || uid2, choice: c, bet: amt, delta: -amt });
        });
      }
    });
    addAudit('question_resolved', { question: q.text, winner, comment }, S.userId);
  }

  saveQuestions(qs); saveBets(bts); saveUsers(users);
  const reps = loadReports();
  reps.push({ id: 'rep' + uid(), question: q.text, winner: q.refunded ? null : winner, refunded: q.refunded || false, totalPool: grand, totalLosingPool: lt, comment: comment || null, rows: reportRows, timestamp: ts() });
  saveReports(reps);
  refreshTokenDisplay(); renderAdmin();
  if (currentTab === 'questions') renderQuestions();
}

function adminRefund(qId) {
  // Force refund regardless of outcome
  adminResolve(qId, '__refund__');
}

function adminReset() {
  const tokenAmt = parseFloat(document.getElementById('reset-tokens')?.value || 100);
  if (isNaN(tokenAmt) || tokenAmt < 1) { alert('Enter a valid token amount.'); return; }
  if (!confirm(`Reset the pool? All questions, bets, and reports will be deleted. Everyone's tokens will be set to ${tokenAmt}.`)) return;
  const users = loadUsers();
  Object.values(users).forEach(u => { u.tokens = tokenAmt; });
  saveUsers(users);
  saveQuestions([]); saveBets({}); saveReports([]);
  addAudit('pool_reset', { tokens: tokenAmt }, S.userId);
  renderAdmin();
  if (currentTab === 'questions') renderQuestions();
}

function genInvite() {
  const code = Math.random().toString(36).slice(2, 8).toUpperCase();
  const invites = loadInvites();
  invites.push({ code, used: false, createdAt: ts() });
  saveInvites(invites);
  addAudit('invite_generated', { code }, S.userId);
  renderAdmin();
}

function revokeInvite(code) {
  const invites = loadInvites();
  const inv = invites.find(i => i.code === code);
  if (inv) { inv.used = true; saveInvites(invites); addAudit('invite_revoked', { code }, S.userId); }
  renderAdmin();
}

function copyInviteLink(code) {
  const link = `${window.location.origin}${window.location.pathname}#invite=${code}`;
  navigator.clipboard.writeText(link).then(() => {
    const out = document.getElementById('inv-out');
    if (out) {
      out.innerHTML = `<div class="alert alert-success mt-sm">Copied: ${link}</div>`;
      setTimeout(() => { if (out) out.innerHTML = ''; }, 4000);
    }
  });
}

function toggleAdmin(uid2) {
  const users = loadUsers();
  if (!users[uid2]) return;
  users[uid2].isAdmin = !users[uid2].isAdmin;
  saveUsers(users);
  addAudit('admin_changed', { target: users[uid2].username, granted: users[uid2].isAdmin }, S.userId);
  renderAdmin();
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function val(id)  { return document.getElementById(id)?.value || ''; }

function showErr(id, msg, type = 'danger') {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `<div class="alert alert-${type} mt-sm">${msg}</div>`;
  setTimeout(() => { if (el) el.innerHTML = ''; }, 4000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

// ═══════════════════════════════════════════════════
// INIT — runs on page load
// ═══════════════════════════════════════════════════
function init() {
  // Check for invite link before anything else
  checkInviteHash();
  // Try to resume session
  const sess = loadSession();
  if (sess?.userId) {
    const meta  = loadMeta();
    const users = loadUsers();
    if (meta && users[sess.userId]) {
      const u = users[sess.userId];
      S = { userId: sess.userId, username: u.username, isAdmin: u.isAdmin, poolName: meta.name };
      enterApp();
      return;
    }
  }
  // No session — show welcome
  const meta = loadMeta();
  if (meta) showAuthTab('login');
  showPage('page-welcome');
}

init();
</script>
